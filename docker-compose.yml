services:
  # Reverse proxy (Caddy)
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
  app:
    build: ./app
    container_name: webapp
    restart: unless-stopped
    expose:
      - "3000"

volumes:
  caddy_data:
  caddy_config:
